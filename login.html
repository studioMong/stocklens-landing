<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="StockLens 로그인" />
  <title>StockLens — 로그인</title>
  <style>
    :root {
      --navy:   #042C53;
      --navy2:  #063660;
      --blue:   #185FA5;
      --blue2:  #1e74cc;
      --accent: #2196F3;
      --green:  #00C853;
      --red:    #FF3B30;
      --white:  #FFFFFF;
      --grey:   #A0B4C8;
      --card:   rgba(255,255,255,0.05);
      --border: rgba(255,255,255,0.1);
      --radius: 16px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--navy);
      color: var(--white);
      font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    a { color: inherit; text-decoration: none; }

    /* ── 네비 ── */
    nav {
      padding: 16px 24px;
      background: rgba(4,44,83,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .nav-logo { font-size: 20px; font-weight: 900; letter-spacing: -0.5px; }
    .nav-logo span { color: var(--accent); }
    .nav-back {
      font-size: 14px;
      color: var(--grey);
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color .2s;
    }
    .nav-back:hover { color: var(--white); }

    /* ── 메인 ── */
    .main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 24px;
      background: radial-gradient(ellipse 70% 50% at 50% 0%, rgba(24,95,165,0.25) 0%, transparent 60%);
    }
    .login-card {
      width: 100%;
      max-width: 420px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 40px;
    }
    @media (max-width: 480px) {
      .login-card { padding: 36px 24px; }
    }

    .login-logo {
      text-align: center;
      font-size: 22px;
      font-weight: 900;
      margin-bottom: 8px;
    }
    .login-logo span { color: var(--accent); }
    .login-title {
      text-align: center;
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 6px;
    }
    .login-sub {
      text-align: center;
      font-size: 14px;
      color: var(--grey);
      margin-bottom: 36px;
    }

    /* ── 폼 ── */
    .form-group { margin-bottom: 18px; }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--grey);
      margin-bottom: 8px;
    }
    input[type="email"],
    input[type="password"] {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 13px 16px;
      font-size: 15px;
      color: var(--white);
      outline: none;
      transition: border-color .2s;
      -webkit-appearance: none;
    }
    input[type="email"]::placeholder,
    input[type="password"]::placeholder { color: rgba(160,180,200,0.5); }
    input[type="email"]:focus,
    input[type="password"]:focus { border-color: var(--accent); }

    /* 비밀번호 토글 */
    .pw-wrap { position: relative; }
    .pw-toggle {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--grey);
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
    }
    .pw-toggle:hover { color: var(--white); }

    /* ── 오류 메시지 ── */
    #error-msg {
      display: none;
      background: rgba(255,59,48,0.1);
      border: 1px solid rgba(255,59,48,0.3);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 13px;
      color: #FF9090;
      margin-bottom: 18px;
    }
    #error-msg.show { display: block; }

    /* ── 제출 버튼 ── */
    .btn-login {
      width: 100%;
      padding: 14px;
      background: var(--blue);
      color: var(--white);
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: background .2s, transform .15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-login:hover:not(:disabled) { background: var(--blue2); transform: translateY(-1px); }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    /* ── 하단 링크 ── */
    .login-footer {
      margin-top: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
    }
    .login-footer a {
      font-size: 13px;
      color: var(--grey);
      transition: color .2s;
    }
    .login-footer a:hover { color: var(--white); }
    .login-footer .divider { color: rgba(160,180,200,0.3); }

    /* 앱 가입 안내 */
    .app-notice {
      margin-top: 24px;
      background: rgba(33,150,243,0.08);
      border: 1px solid rgba(33,150,243,0.2);
      border-radius: 12px;
      padding: 16px 18px;
      font-size: 13px;
      color: var(--grey);
      text-align: center;
      line-height: 1.7;
    }
    .app-notice strong { color: var(--accent); }

    /* ── 비밀번호 찾기 모달 ── */
    #pw-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(4,44,83,0.88);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    #pw-modal.show { display: flex; }
    .modal-card {
      background: #0c2340;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 36px 32px;
      width: 100%;
      max-width: 400px;
    }
    .modal-title {
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    .modal-sub { font-size: 13px; color: var(--grey); margin-bottom: 24px; }
    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }
    .btn-modal-cancel {
      flex: 1;
      padding: 12px;
      background: transparent;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      color: var(--grey);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-modal-cancel:hover { border-color: rgba(255,255,255,0.3); color: var(--white); }
    .btn-modal-send {
      flex: 1;
      padding: 12px;
      background: var(--blue);
      border: none;
      border-radius: 10px;
      color: var(--white);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }
    .btn-modal-send:hover { background: var(--blue2); }
    .btn-modal-send:disabled { opacity: 0.6; cursor: not-allowed; }
    #pw-modal-msg {
      font-size: 13px;
      margin-top: 12px;
      min-height: 18px;
      text-align: center;
    }
    #pw-modal-msg.ok { color: var(--green); }
    #pw-modal-msg.err { color: #FF9090; }

    /* ── 스피너 ── */
    .spinner-sm {
      width: 18px; height: 18px;
      border: 3px solid rgba(255,255,255,0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: none;
    }
    .btn-login.loading .spinner-sm { display: block; }
    .btn-login.loading .btn-text { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── 푸터 ── */
    footer {
      padding: 24px;
      text-align: center;
      border-top: 1px solid var(--border);
    }
    footer p { font-size: 12px; color: var(--grey); }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">Stock<span>Lens</span></a>

</nav>

<main class="main">
  <div class="login-card">
    <div class="login-logo">Stock<span>Lens</span></div>
    <h1 class="login-title">로그인</h1>
    <p class="login-sub">계정에 로그인하여 서비스를 이용하세요</p>

    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="email">이메일</label>
        <input type="email" id="email" name="email" placeholder="example@email.com" autocomplete="email" required />
      </div>
      <div class="form-group">
        <label for="password">비밀번호</label>
        <div class="pw-wrap">
          <input type="password" id="password" name="password" placeholder="비밀번호를 입력하세요" autocomplete="current-password" required />
          <button type="button" class="pw-toggle" onclick="togglePw()" aria-label="비밀번호 표시">
            <svg id="pw-eye" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <div id="error-msg"></div>

      <button type="submit" class="btn-login" id="btn-submit">
        <div class="spinner-sm"></div>
        <span class="btn-text">로그인</span>
      </button>
    </form>

    <div class="login-footer">
      <a href="#" onclick="openPwModal(event)">비밀번호를 잊으셨나요?</a>
    </div>

    <div class="app-notice">
      <strong>회원가입은 앱에서만 가능합니다.</strong><br/>
      App Store에서 StockLens를 다운로드하여 회원가입 후 이용해 주세요.
    </div>
  </div>
</main>

<!-- ── 비밀번호 찾기 모달 ── -->
<div id="pw-modal">
  <div class="modal-card">
    <div class="modal-title">비밀번호 재설정</div>
    <p class="modal-sub">가입한 이메일을 입력하면 재설정 링크를 보내드립니다.</p>
    <div class="form-group">
      <label for="reset-email">이메일</label>
      <input type="email" id="reset-email" placeholder="example@email.com" />
    </div>
    <div id="pw-modal-msg"></div>
    <div class="modal-actions">
      <button class="btn-modal-cancel" onclick="closePwModal()">취소</button>
      <button class="btn-modal-send" id="btn-send-reset" onclick="sendResetEmail()">전송</button>
    </div>
  </div>
</div>

<footer>
  <p>© 2026 moodilab. All rights reserved. &nbsp;|&nbsp; 본 서비스는 투자 추천이 아닙니다.</p>
</footer>

<script>
  const BACKEND_URL = 'https://stocklens-production-3724.up.railway.app';

  /* ── 이미 로그인 상태면 리다이렉트 ── */
  (function checkAlreadyLoggedIn() {
    if (localStorage.getItem('accessToken')) {
      const params = new URLSearchParams(window.location.search);
      const redirect = params.get('redirect');
      window.location.href = redirect ? decodeURIComponent(redirect) : 'mypage.html';
    }
  })();

  /* ── 비밀번호 표시 토글 ── */
  function togglePw() {
    const input = document.getElementById('password');
    input.type = input.type === 'password' ? 'text' : 'password';
  }

  /* ── 오류 표시 ── */
  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.classList.add('show');
  }
  function clearError() {
    document.getElementById('error-msg').classList.remove('show');
  }

  /* ── 로그인 ── */
  async function handleLogin(e) {
    e.preventDefault();
    clearError();

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('btn-submit');

    btn.classList.add('loading');
    btn.disabled = true;

    try {
      const res = await fetch(BACKEND_URL + '/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password }),
      });

      const data = await res.json().catch(() => ({}));

      if (!res.ok) {
        const msg = data.message || (res.status === 401 ? '이메일 또는 비밀번호가 올바르지 않습니다.' : '로그인에 실패했습니다.');
        showError(msg);
        return;
      }

      // 토큰 저장
      localStorage.setItem('accessToken', data.accessToken);
      if (data.refreshToken) localStorage.setItem('refreshToken', data.refreshToken);

      // 리다이렉트
      const params = new URLSearchParams(window.location.search);
      const redirect = params.get('redirect');
      window.location.href = redirect ? decodeURIComponent(redirect) : 'mypage.html';

    } catch (err) {
      console.error('로그인 오류:', err);
      showError('네트워크 오류가 발생했습니다. 잠시 후 다시 시도해 주세요.');
    } finally {
      btn.classList.remove('loading');
      btn.disabled = false;
    }
  }

  /* ── 비밀번호 찾기 모달 ── */
  function openPwModal(e) {
    e.preventDefault();
    document.getElementById('pw-modal').classList.add('show');
    document.getElementById('reset-email').value = document.getElementById('email').value;
    document.getElementById('pw-modal-msg').textContent = '';
    document.getElementById('pw-modal-msg').className = '';
  }
  function closePwModal() {
    document.getElementById('pw-modal').classList.remove('show');
  }

  async function sendResetEmail() {
    const email = document.getElementById('reset-email').value.trim();
    const msgEl = document.getElementById('pw-modal-msg');
    const btn = document.getElementById('btn-send-reset');

    if (!email) {
      msgEl.textContent = '이메일을 입력해 주세요.';
      msgEl.className = 'err';
      return;
    }

    btn.disabled = true;
    btn.textContent = '전송 중…';
    msgEl.textContent = '';

    try {
      const res = await fetch(BACKEND_URL + '/auth/forgot-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email }),
      });

      if (res.ok) {
        msgEl.textContent = '재설정 링크를 이메일로 전송했습니다.';
        msgEl.className = 'ok';
        btn.textContent = '전송 완료';
      } else {
        msgEl.textContent = '전송에 실패했습니다. 이메일을 확인해 주세요.';
        msgEl.className = 'err';
        btn.disabled = false;
        btn.textContent = '전송';
      }
    } catch {
      msgEl.textContent = '네트워크 오류가 발생했습니다.';
      msgEl.className = 'err';
      btn.disabled = false;
      btn.textContent = '전송';
    }
  }

  /* ── 모달 바깥 클릭 시 닫기 ── */
  document.getElementById('pw-modal').addEventListener('click', function(e) {
    if (e.target === this) closePwModal();
  });
</script>
</body>
</html>
