<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="StockLens 웹 로그인 — 앱에서 발급받은 인증코드로 로그인하세요" />
  <title>StockLens — 로그인</title>
  <style>
    :root {
      --navy:   #042C53;
      --navy2:  #063660;
      --blue:   #185FA5;
      --blue2:  #1e74cc;
      --accent: #2196F3;
      --green:  #00C853;
      --red:    #FF3B30;
      --white:  #FFFFFF;
      --grey:   #A0B4C8;
      --card:   rgba(255,255,255,0.05);
      --border: rgba(255,255,255,0.1);
      --radius: 16px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--navy);
      color: var(--white);
      font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    a { color: inherit; text-decoration: none; }

    /* ── 네비 ── */
    nav {
      padding: 16px 24px;
      background: rgba(4,44,83,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .nav-logo { font-size: 20px; font-weight: 900; letter-spacing: -0.5px; }
    .nav-logo span { color: var(--accent); }

    /* ── 메인 ── */
    .main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 24px;
      background: radial-gradient(ellipse 70% 50% at 50% 0%, rgba(24,95,165,0.25) 0%, transparent 60%);
    }
    .login-card {
      width: 100%;
      max-width: 420px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 40px;
    }
    @media (max-width: 480px) {
      .login-card { padding: 36px 24px; }
    }

    .login-logo {
      text-align: center;
      font-size: 22px;
      font-weight: 900;
      margin-bottom: 8px;
    }
    .login-logo span { color: var(--accent); }
    .login-title {
      text-align: center;
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 6px;
    }
    .login-sub {
      text-align: center;
      font-size: 14px;
      color: var(--grey);
      margin-bottom: 32px;
    }

    /* ── 앱 안내 배너 ── */
    .otp-guide {
      background: rgba(33,150,243,0.08);
      border: 1px solid rgba(33,150,243,0.25);
      border-radius: 12px;
      padding: 14px 18px;
      font-size: 13px;
      color: var(--grey);
      line-height: 1.7;
      margin-bottom: 28px;
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }
    .otp-guide-icon {
      font-size: 20px;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .otp-guide strong { color: var(--accent); display: block; margin-bottom: 2px; }

    /* ── 폼 ── */
    .form-group { margin-bottom: 20px; }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--grey);
      margin-bottom: 8px;
    }
    /* ── OTP 입력 6칸 ── */
    .otp-wrap {
      display: flex;
      gap: 10px;
      justify-content: space-between;
    }
    .otp-digit {
      flex: 1;
      max-width: 52px;
      height: 60px;
      background: rgba(255,255,255,0.06);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      text-align: center;
      font-size: 24px;
      font-weight: 700;
      color: var(--white);
      outline: none;
      transition: border-color .2s, background .2s;
      caret-color: var(--accent);
      -webkit-appearance: none;
    }
    .otp-digit::placeholder { color: rgba(160,180,200,0.25); font-size: 18px; }
    .otp-digit:focus {
      border-color: var(--accent);
      background: rgba(33,150,243,0.08);
    }
    .otp-digit.filled {
      border-color: rgba(33,150,243,0.5);
    }
    @media (max-width: 380px) {
      .otp-wrap { gap: 7px; }
      .otp-digit { height: 52px; font-size: 20px; }
    }

    /* ── 오류 메시지 ── */
    #error-msg {
      display: none;
      background: rgba(255,59,48,0.1);
      border: 1px solid rgba(255,59,48,0.3);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 13px;
      color: #FF9090;
      margin-bottom: 18px;
      line-height: 1.5;
    }
    #error-msg.show { display: block; }

    /* ── 제출 버튼 ── */
    .btn-login {
      width: 100%;
      padding: 14px;
      background: var(--blue);
      color: var(--white);
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: background .2s, transform .15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-login:hover:not(:disabled) { background: var(--blue2); transform: translateY(-1px); }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    /* ── 스피너 ── */
    .spinner-sm {
      width: 18px; height: 18px;
      border: 3px solid rgba(255,255,255,0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: none;
    }
    .btn-login.loading .spinner-sm { display: block; }
    .btn-login.loading .btn-text { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── 하단 ── */
    .login-footer {
      margin-top: 28px;
      text-align: center;
      font-size: 13px;
      color: var(--grey);
      line-height: 1.7;
    }
    .login-footer a { color: var(--accent); }
    .login-footer a:hover { text-decoration: underline; }

    /* ── 푸터 ── */
    footer {
      padding: 24px;
      text-align: center;
      border-top: 1px solid var(--border);
    }
    footer p { font-size: 12px; color: var(--grey); }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">Stock<span>Lens</span></a>
</nav>

<main class="main">
  <div class="login-card">
    <div class="login-logo">Stock<span>Lens</span></div>
    <h1 class="login-title">웹 결제 로그인</h1>
    <p class="login-sub">앱에서 발급받은 인증코드 6자리를 입력해주세요</p>

    <div class="otp-guide">
      <div class="otp-guide-icon">📱</div>
      <div>
        <strong>인증코드 발급 방법</strong>
        StockLens 앱 → 내 정보 탭 → <b>웹 결제 인증코드 발급</b>을 탭하여 6자리 코드를 확인하세요.
      </div>
    </div>

    <form id="login-form" onsubmit="handleLogin(event)" novalidate>
      <div class="form-group">
        <label>인증코드 (6자리)</label>
        <div class="otp-wrap" id="otp-wrap">
          <input class="otp-digit" type="text" inputmode="numeric" maxlength="1" placeholder="·" autocomplete="one-time-code" aria-label="인증코드 1번째 자리" />
          <input class="otp-digit" type="text" inputmode="numeric" maxlength="1" placeholder="·" aria-label="인증코드 2번째 자리" />
          <input class="otp-digit" type="text" inputmode="numeric" maxlength="1" placeholder="·" aria-label="인증코드 3번째 자리" />
          <input class="otp-digit" type="text" inputmode="numeric" maxlength="1" placeholder="·" aria-label="인증코드 4번째 자리" />
          <input class="otp-digit" type="text" inputmode="numeric" maxlength="1" placeholder="·" aria-label="인증코드 5번째 자리" />
          <input class="otp-digit" type="text" inputmode="numeric" maxlength="1" placeholder="·" aria-label="인증코드 6번째 자리" />
        </div>
      </div>

      <div id="error-msg" role="alert"></div>

      <button type="submit" class="btn-login" id="btn-submit" disabled>
        <div class="spinner-sm"></div>
        <span class="btn-text">로그인</span>
      </button>
    </form>

    <div class="login-footer">
      아직 앱이 없으신가요?
      <a href="https://apps.apple.com/app/stocklens" target="_blank" rel="noopener">App Store에서 다운로드</a>
    </div>
  </div>
</main>

<footer>
  <p>© 2026 moodilab. All rights reserved. &nbsp;|&nbsp; 본 서비스는 투자 추천이 아닙니다.</p>
</footer>

<script>
  const BACKEND_URL = 'https://stocklensremake-production-06ab.up.railway.app';

  /* ── 이미 로그인 상태면 리다이렉트 ── */
  (function checkAlreadyLoggedIn() {
    if (sessionStorage.getItem('accessToken')) {
      const params = new URLSearchParams(window.location.search);
      const redirect = params.get('redirect');
      window.location.href = redirect ? decodeURIComponent(redirect) : 'mypage.html';
    }
  })();

  /* ── OTP 입력 컨트롤 ── */
  const digits = Array.from(document.querySelectorAll('.otp-digit'));
  const btn    = document.getElementById('btn-submit');

  function getOtp() {
    return digits.map(d => d.value).join('');
  }

  function updateSubmitState() {
    btn.disabled = getOtp().length !== 6;
  }

  digits.forEach((el, i) => {
    el.addEventListener('input', function (e) {
      // 숫자만 허용
      const val = this.value.replace(/\D/g, '');
      this.value = val ? val[val.length - 1] : '';

      if (this.value) {
        this.classList.add('filled');
        if (i < digits.length - 1) digits[i + 1].focus();
      } else {
        this.classList.remove('filled');
      }
      updateSubmitState();
    });

    // 붙여넣기 처리
    el.addEventListener('paste', function (e) {
      e.preventDefault();
      const pasted = (e.clipboardData || window.clipboardData)
        .getData('text')
        .replace(/\D/g, '')
        .slice(0, 6);
      pasted.split('').forEach((ch, idx) => {
        if (digits[i + idx]) {
          digits[i + idx].value = ch;
          digits[i + idx].classList.add('filled');
        }
      });
      const next = i + pasted.length;
      if (digits[next]) digits[next].focus();
      else digits[digits.length - 1].blur();
      updateSubmitState();
    });

    el.addEventListener('keydown', function (e) {
      if (e.key === 'Backspace' && !this.value && i > 0) {
        digits[i - 1].value = '';
        digits[i - 1].classList.remove('filled');
        digits[i - 1].focus();
        updateSubmitState();
      }
      // ArrowLeft / ArrowRight 이동
      if (e.key === 'ArrowLeft'  && i > 0)              { e.preventDefault(); digits[i - 1].focus(); }
      if (e.key === 'ArrowRight' && i < digits.length-1){ e.preventDefault(); digits[i + 1].focus(); }
    });
  });

  /* ── 오류 표시 ── */
  function showError(msg) {
    const el = document.getElementById('error-msg');
    // XSS 방지: textContent 사용
    el.textContent = msg;
    el.classList.add('show');
  }
  function clearError() {
    const el = document.getElementById('error-msg');
    el.textContent = '';
    el.classList.remove('show');
  }

  function resetOtp() {
    digits.forEach(d => { d.value = ''; d.classList.remove('filled'); });
    digits[0].focus();
    updateSubmitState();
  }

  /* ── 로그인 ── */
  async function handleLogin(e) {
    e.preventDefault();
    clearError();

    const otp = getOtp();

    if (otp.length !== 6) { showError('인증코드 6자리를 모두 입력해 주세요.'); return; }

    btn.classList.add('loading');
    btn.disabled = true;

    try {
      const res = await fetch(BACKEND_URL + '/auth/web-login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ otp }),
      });

      const data = await res.json().catch(() => ({}));

      if (!res.ok) {
        let msg;
        if (res.status === 401) {
          const code = (data.code || '').toUpperCase();
          if (code === 'OTP_EXPIRED')  msg = '인증코드가 만료되었습니다. 앱에서 새 코드를 발급해 주세요.';
          else if (code === 'OTP_INVALID') msg = '인증코드가 올바르지 않습니다. 코드를 다시 확인해 주세요.';
          else if (code === 'BLOCKED') msg = '로그인 시도가 너무 많습니다. 잠시 후 다시 시도해 주세요.';
          else msg = data.message || '이메일 또는 인증코드가 올바르지 않습니다.';
        } else if (res.status === 429) {
          msg = '요청이 너무 많습니다. 잠시 후 다시 시도해 주세요.';
        } else {
          msg = data.message || '로그인에 실패했습니다. 다시 시도해 주세요.';
        }
        showError(msg);
        resetOtp();
        return;
      }

      // sessionStorage에 토큰 저장 (탭 닫으면 만료)
      sessionStorage.setItem('accessToken', data.accessToken);

      // 리다이렉트
      const params   = new URLSearchParams(window.location.search);
      const redirect = params.get('redirect');
      window.location.href = redirect ? decodeURIComponent(redirect) : 'mypage.html';

    } catch (err) {
      console.error('로그인 오류:', err);
      showError('네트워크 오류가 발생했습니다. 잠시 후 다시 시도해 주세요.');
    } finally {
      btn.classList.remove('loading');
      updateSubmitState(); // disabled 상태 재계산
    }
  }
</script>
</body>
</html>
